version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kore_logic_db
    environment:
      POSTGRES_USER: kore_logic_user
      POSTGRES_PASSWORD: kore_logic_password
      POSTGRES_DB: kore_logic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
